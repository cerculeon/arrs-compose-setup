version: '3'
services:
  elasticsearch:
    image: 'docker.elastic.co/elasticsearch/elasticsearch:7.17.7-arm64'
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - cluster.name=docker-cluster
      - bootstrap.memory_lock=true
      - network.host=0.0.0.0
      - network.publish_host=${BEATS_HOST}
      - http.cors.enabled=true
      - http.cors.allow-origin=*
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - 'esdata:/usr/share/elasticsearch/data'
    ports:
      - '9200:9200'
      - '9300:9300'
    restart: unless-stopped
    networks:
      - esnet

  kibana:
    image: 'docker.elastic.co/kibana/kibana:7.17.7-arm64'
    container_name: kibana
    environment:
      - 'ELASTICSEARCH_HOSTS=http://elasticsearch:9200'
    ports:
      - '5601:5601'
    restart: unless-stopped
    networks:
      - esnet
    depends_on:
      - elasticsearch

  portainer:
    image: portainer/portainer
    container_name: portainer
    command: -H tcp://${BEATS_HOST}:2375  # Connect to the remote Docker instance
    ports:
      - '9191:9000'
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'  # Required to access Docker API
    restart: unless-stopped
    networks:
      - esnet
    depends_on:
      - elasticsearch

networks:
  esnet:
    driver: bridge

volumes:
  esdata:
    driver: local
