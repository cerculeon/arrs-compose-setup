name: Feature request
description: Suggest an improvement for the stack, tooling, or docs
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Please provide context and the problem this feature solves.

  - type: input
    id: summary
    attributes:
      label: Feature summary
      description: Short title for the proposal
      placeholder: Add GitHub Actions compose validation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred approach
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or tradeoffs

  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - Compose files
        - Scripts
        - Observability
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits and how?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for similar requests
          required: true
        - label: This request aligns with the project scope (self-hosted HTPC stack)
          required: true
