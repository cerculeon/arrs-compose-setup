name: Bug report
description: Report a reproducible problem with the stack or docs
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        Please provide as much detail as possible so we can reproduce quickly.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug
      placeholder: Sonarr cannot import completed downloads
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps so we can reproduce
      placeholder: |
        1. Run ./runHTPCStack.sh yes
        2. Open Sonarr on :8989
        3. Trigger import from completed downloads
        4. Observe error
    validations:
      required: true

  - type: dropdown
    id: affected_stack
    attributes:
      label: Affected stack
      options:
        - HTPC stack (htpcServices.yml)
        - Observer stack (observabilityServices.yml)
        - Both
        - Not sure
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Host OS
      placeholder: Ubuntu 24.04, Debian 12, etc.
    validations:
      required: true

  - type: input
    id: docker_version
    attributes:
      label: Docker version
      placeholder: docker version --short output
    validations:
      required: true

  - type: input
    id: compose_version
    attributes:
      label: Compose version
      placeholder: docker compose version --short output
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant logs or error messages (remove sensitive data)
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I ran config validation (./runHTPCStack.sh and/or ./runObserverStack.sh)
          required: false
        - label: I removed secrets/private data from logs and screenshots
          required: true
        - label: I searched existing issues for duplicates
          required: true
