name: arrs-compose-setup
services:
  audiobookshelf:
    container_name: audiobookshelf
    environment:
      PGID: "1000"
      PUID: "1000"
      TZ: Europe/London
    hostname: abs_host
    image: ghcr.io/advplyr/audiobookshelf:latest
    networks:
      htpc_net:
        ipv4_address: 172.66.1.12
    ports:
      - mode: ingress
        target: 80
        published: "13378"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /opt/htpc-config/audiobookshelf
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: /opt/htpc-config/audiobookshelf/metadata
        target: /metadata
        bind:
          create_host_path: true
      - type: bind
        source: /mnt/media/books/audiobooks
        target: /audiobooks
        bind:
          create_host_path: true
      - type: bind
        source: /mnt/media/books/ebooks
        target: /ebooks
        bind:
          create_host_path: true
  calibre-web:
    container_name: calibre-web
    environment:
      PGID: "1000"
      PUID: "1000"
      TZ: Europe/London
    hostname: cal_host
    image: lscr.io/linuxserver/calibre-web:latest
    networks:
      htpc_net:
        ipv4_address: 172.66.1.9
    ports:
      - mode: ingress
        target: 8083
        published: "8083"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /opt/htpc-config/calibre-web
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: /mnt/media/books/ebooks
        target: /books
        bind:
          create_host_path: true
  cloudflared:
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - eyJhIjoiMDdjMTQ4YzQyYWRlN2UyMGViOTRiYTI3NDNmNjkxY2EiLCJ0IjoiNGFmMzU4YjgtYTgzMS00Y2RhLThiNzQtMmQ2ZDExMmI1MDVhIiwicyI6IlpEQTROR00yTkRRdE1tWTFOeTAwWlRrM0xXSmtNall0T1RJeFlUWXdZVGc0TmpkaiJ9
    container_name: cloudflared
    hostname: cfd_host
    image: cloudflare/cloudflared:latest
    networks:
      htpc_net:
        ipv4_address: 172.66.1.18
    restart: unless-stopped
    volumes:
      - type: bind
        source: /opt/htpc-config/cloudflared
        target: /home/nonroot/.cloudflared
        bind:
          create_host_path: true
  filebeat:
    container_name: filebeat
    hostname: fil_host
    image: elastic/filebeat:8.19.16
    networks:
      htpc_net:
        ipv4_address: 172.66.1.15
    restart: unless-stopped
    user: root
    volumes:
      - type: bind
        source: /var/lib/docker
        target: /var/lib/docker
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /opt/arrs-compose-setup/filebeat/filebeat.yml
        target: /usr/share/filebeat/filebeat.yml
        bind:
          create_host_path: true
      - type: bind
        source: /opt/arrs-compose-setup/filebeat/modules.d
        target: /usr/share/filebeat/modules.d
        bind:
          create_host_path: true
      - type: bind
        source: /opt/arrs-compose-setup/filebeat/filebeat-ilm.json
        target: /usr/share/filebeat/filebeat-ilm.json
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /opt/htpc-config/filebeat/logs
        target: /var/log/filebeat
        bind:
          create_host_path: true
  flaresolverr:
    container_name: flaresolverr
    environment:
      CAPTCHA_SOLVER: none
      LOG_HTML: "false"
      LOG_LEVEL: info
      TZ: Europe/London
    image: ghcr.io/flaresolverr/flaresolverr:latest
    networks:
      htpc_net:
        ipv4_address: 172.66.1.17
    ports:
      - mode: ingress
        target: 8191
        published: "8191"
        protocol: tcp
    restart: unless-stopped
  jellyfin:
    container_name: jellyfin
    environment:
      PGID: "1000"
      PUID: "1000"
      TZ: Etc/UTC
    hostname: jel_host
    image: lscr.io/linuxserver/jellyfin:latest
    networks:
      htpc_net:
        ipv4_address: 172.66.1.13
    ports:
      - mode: ingress
        target: 8096
        published: "8096"
        protocol: tcp
      - mode: ingress
        target: 8920
        published: "8920"
        protocol: tcp
      - mode: ingress
        target: 7359
        published: "7359"
        protocol: udp
      - mode: ingress
        target: 1900
        published: "1900"
        protocol: udp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /opt/htpc-config/jellyfin
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: /mnt/media/tv
        target: /data/tvshows
        bind:
          create_host_path: true
      - type: bind
        source: /mnt/media/movies
        target: /data/movies
        bind:
          create_host_path: true
      - type: bind
        source: /opt/htpc-config/jellyfin/plugins
        target: /plugins
        bind:
          create_host_path: true
  lazylibrarian:
    container_name: lazylibrarian
    environment:
      DOCKER_MODS: linuxserver/mods:lazylibrarian-ffmpeg
      PGID: "1000"
      PUID: "1000"
      TZ: Europe/London
    hostname: laz_host
    image: lscr.io/linuxserver/lazylibrarian:latest
    networks:
      htpc_net:
        ipv4_address: 172.66.1.11
    ports:
      - mode: ingress
        target: 5299
        published: "5299"
