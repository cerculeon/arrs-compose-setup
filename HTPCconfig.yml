    restart: unless-stopped
    volumes:
      - type: bind
        source: /opt/htpc-config/lazylibrarian
        target: /config
        bind:
          create_host_path: true
      - type: bind
        source: /mnt/media/books/ebooks
        target: /ebooks
        bind:
          create_host_path: true
      - type: bind
        source: /mnt/media/books/audiobooks
        target: /audiobooks
        bind:
          create_host_path: true
      - type: bind
        source: /mnt/media/downloads/complete
        target: /downloads
        bind:
          create_host_path: true
  metricbeat:
    container_name: metricbeat
    environment:
      ELASTICSEARCH_HOSTS: http://192.168.4.103:9200
      setup.kibana.host: 192.168.4.103:5601
    hostname: met_host
    image: elastic/metricbeat:8.19.16
    networks:
      htpc_net:
        ipv4_address: 172.66.1.16
    restart: unless-stopped
    user: root
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /sys/fs/cgroup
        target: /hostfs/sys/fs/cgroup
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /proc
        target: /hostfs/proc
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /
        target: /hostfs
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: /opt/arrs-compose-setup/metricbeat/metricbeat.yml
        target: /usr/share/metricbeat/metricbeat.yml
        bind:
          create_host_path: true
      - type: bind
        source: /opt/arrs-compose-setup/metricbeat/metricbeat-ilm.json
        target: /usr/share/metricbeat/metricbeat-ilm.json
        read_only: true
        bind:
          create_host_path: true
  mylar3:
