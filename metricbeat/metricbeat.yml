metricbeat.modules:
  - module: docker
    metricsets:
      - container
      - cpu
      - diskio
      - healthcheck
      - info
      - image
      - memory
      - network
    hosts: ["unix:///var/run/docker.sock"]
    period: 10s
    enabled: true

setup.kibana:
  host: "http://192.168.4.125:5601"

setup.ilm.enabled: true
setup.ilm.overwrite: true
setup.ilm.policy_name: "metricbeat"
setup.ilm.policy_file: "/usr/share/metricbeat/metricbeat-ilm.json"

output.elasticsearch:
  hosts: ["http://192.168.4.125:9200"]

# Optional but recommended
monitoring.enabled: false

# Reduce logging noise
logging.level: info

# Add useful host metadata automatically
processors:
  - add_host_metadata: ~
  - add_docker_metadata: ~
