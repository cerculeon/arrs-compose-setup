version: '3.0'
services:
  sabnzbd:
    image: linuxserver/sabnzbd
    hostname: sab_host
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - '${CONFIG_ROOT}/sabnzbd:/config'
      - '${COMPLETE_DOWNLOADS}:/downloads'
      - '${INCOMPLETE_DOWNLOADS}:/incomplete-downloads'
      - '${WATCH_FOLDER}:/media/watch'
      - '${TV_FOLDER}:/media/TV'
      - '${MOVIE_FOLDER}/:/media/MOVIES'
    ports:
      - '8088:8080'
      - '9999:9090'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.1
  transmission:
    image: 'linuxserver/transmission:3.00-r5-ls137'
    hostname: tra_host
    container_name: transmission
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - '${CONFIG_ROOT}/transmission:/config'
      - '${COMPLETE_DOWNLOADS}:/downloads'
      - '${WATCH_FOLDER}:/watch'
    ports:
      - '9091:9091'
      - '51413:51413'
      - '51413:51413/udp'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.3
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    hostname: pro_host
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - UMASK_SET=022
    volumes:
      - '${CONFIG_ROOT}/prowlarr:/config'
    ports:
      - '9696:9696'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.4
  radarr:
    image: linuxserver/radarr
    hostname: rad_host
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - UMASK_SET=002
    volumes:
      - '${CONFIG_ROOT}/radarr:/config'
      - '${MOVIE_FOLDER}:/movies'
      - '${COMPLETE_DOWNLOADS}:/downloads'
    ports:
      - '7878:7878'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.5
  sonarr:
    image: linuxserver/sonarr
    hostname: son_host
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - UMASK_SET=002
    volumes:
      - '${CONFIG_ROOT}/sonarr:/config'
      - '${TV_FOLDER}:/tv'
      - '${COMPLETE_DOWNLOADS}:/downloads'
    ports:
      - '8989:8989'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.6
  mylar3:
    image: 'lscr.io/linuxserver/mylar3:latest'
    hostname: myl_host
    container_name: mylar3
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - '${CONFIG_ROOT}/mylar3:/config'
      - '${COMIC_FOLDER}:/comics'
      - '${COMPLETE_DOWNLOADS}:/downloads'
    ports:
      - '8090:8090'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.7
  readarr:
    image: lscr.io/linuxserver/readarr:develop
    hostname: rea_host
    container_name: readarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - UMASK_SET=022
    volumes:
      - '${CONFIG_ROOT}/readarr:/config'
      - '${EBOOK_FOLDER}:/EBOOKS'
      - '${COMPLETE_DOWNLOADS}:/downloads'
    ports:
      - '8787:8787'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.8
  plex:
    image: linuxserver/plex
    hostname: ple_host
    container_name: plex
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
    network_mode: host
    volumes:
      - '${CONFIG_ROOT}/plex:/config'
      - '${TV_FOLDER}:/data/tvshows'
      - ${MOVIE_FOLDER}:/data/movies
      - /media/transcode:/transcode
    restart: unless-stopped
  filebeat:
    user: root
    image: 'docker.elastic.co/beats/filebeat:5.6.0'
    hostname: fil_host
    container_name: filebeat
    volumes:
      - '/var/lib/docker:/var/lib/docker:ro'
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
      - '${CONFIG_ROOT}/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml'
      - '${CONFIG_ROOT}/filebeat/logs:/var/log/filebeat'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.9
  metricbeat:
    user: root
    image: 'docker.elastic.co/beats/metricbeat:5.6.0'
    hostname: met_host
    container_name: metricbeat
    environment:
      - 'setup.kibana.host=${KIBANA_HOST}:5601'
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
      - '/sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro'
      - '/proc:/hostfs/proc:ro'
      - '/:/hostfs:ro'
      - '${CONFIG_ROOT}/metricbeat/metricbeat.yml:/usr/share/metricbeat/metricbeat.yml'
      - '${CONFIG_ROOT}/metricbeat/modules.d:/usr/share/metricbeat/modules.d:ro'
      - '${MOVIE_FOLDER}:/data/movies'
      - '/media/transcode:/transcode'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.10
  tautulli:
    image: tautulli/tautulli
    hostname: tau_host
    container_name: tautulli
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - '${CONFIG_ROOT}/tautulli:/config'
    ports:
      - '8181:8181'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.11
        
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_ROOT}/jellyfin:/config
      - ${TV_FOLDER}:/data/tvshows
      - ${MOVIE_FOLDER}:/data/movies
    ports:
      - 8096:8096
      - 8920:8920 #optional
      - 7359:7359/udp #optional
      - 1900:1900/udp #optional
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.12
networks:
  htpc_net:
    ipam:
      driver: default
      config:
        - subnet: 172.66.0.0/16
