---
services:
  sabnzbd:
    image: linuxserver/sabnzbd
    hostname: sab_host
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - '${CONFIG_ROOT}/sabnzbd:/config'
      - '${COMPLETE_DOWNLOADS}:/downloads'
      - '${INCOMPLETE_DOWNLOADS}:/incomplete-downloads'
      - '${WATCH_FOLDER}:/media/watch'
      - '${TV_FOLDER}:/media/TV'
      - '${MOVIE_FOLDER}/:/media/MOVIES'
    ports:
      - '8088:8080'
      - '9999:9090'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.1
  transmission:
    image: 'linuxserver/transmission:3.00-r5-ls137'
    hostname: tra_host
    container_name: transmission
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - '${CONFIG_ROOT}/transmission:/config'
      - '${COMPLETE_DOWNLOADS}:/downloads'
      - '${WATCH_FOLDER}:/watch'
    ports:
      - '9091:9091'
      - '51413:51413'
      - '51413:51413/udp'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.3
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    hostname: pro_host
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - UMASK_SET=022
    volumes:
      - '${CONFIG_ROOT}/prowlarr:/config'
    ports:
      - '9696:9696'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.4
  radarr:
    image: linuxserver/radarr
    hostname: rad_host
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - UMASK_SET=002
    volumes:
      - '${CONFIG_ROOT}/radarr:/config'
      - '${MOVIE_FOLDER}:/movies'
      - '${COMPLETE_DOWNLOADS}:/downloads'
    ports:
      - '7878:7878'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.5
  sonarr:
    image: linuxserver/sonarr
    hostname: son_host
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - UMASK_SET=002
    volumes:
      - '${CONFIG_ROOT}/sonarr:/config'
      - '${TV_FOLDER}:/tv'
      - '${COMPLETE_DOWNLOADS}:/downloads'
    ports:
      - '8989:8989'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.6
  mylar3:
    image: 'lscr.io/linuxserver/mylar3:latest'
    hostname: myl_host
    container_name: mylar3
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - '${CONFIG_ROOT}/mylar3:/config'
      - '${COMIC_FOLDER}:/comics'
      - '${COMPLETE_DOWNLOADS}:/downloads'
    ports:
      - '8090:8090'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.7
  lazylibrarian:
    image: lscr.io/linuxserver/lazylibrarian:latest
    hostname: laz_host
    container_name: lazylibrarian
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - DOCKER_MODS=linuxserver/mods:lazylibrarian-ffmpeg
    volumes:
      - '${CONFIG_ROOT}/lazylibrarian:/config'
      - '${EBOOK_FOLDER}:/ebooks'
      - '${AUDIOBOOK_FOLDER}:/audiobooks'
      - '${COMPLETE_DOWNLOADS}:/downloads'
    ports:
      - '5299:5299'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.16

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    hostname: abs_host
    container_name: audiobookshelf
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - '${CONFIG_ROOT}/audiobookshelf:/config'
      - '${CONFIG_ROOT}/audiobookshelf/metadata:/metadata'
      - '${AUDIOBOOK_FOLDER}:/audiobooks'
      - '${EBOOK_FOLDER}:/ebooks'
    ports:
      - '13378:80'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.14
  plex:
    image: linuxserver/plex
    hostname: ple_host
    container_name: plex
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
    network_mode: host
    volumes:
      - '${CONFIG_ROOT}/plex:/config'
      - '${TV_FOLDER}:/data/tvshows'
      - ${MOVIE_FOLDER}:/data/movies
      - /media/transcode:/transcode
    restart: unless-stopped
  filebeat:
    user: root
    image: 'docker.elastic.co/beats/filebeat:7.17.7'
    hostname: fil_host
    container_name: filebeat
    volumes:
      - '/var/lib/docker:/var/lib/docker:ro'
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
      - '${HTPC_DOCKER_COMPOSE_ROOT}/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml'
      - '${HTPC_DOCKER_COMPOSE_ROOT}/filebeat/modules.d:/usr/share/filebeat/modules.d'
      - '${HTPC_DOCKER_COMPOSE_ROOT}/filebeat/filebeat-ilm.json:/usr/share/filebeat/filebeat-ilm.json:ro'
      - '${CONFIG_ROOT}/filebeat/logs:/var/log/filebeat'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.9
  metricbeat:
    user: root
    image: 'docker.elastic.co/beats/metricbeat:7.17.7'
    hostname: met_host
    container_name: metricbeat
    environment:
      - 'setup.kibana.host=${KIBANA_HOST}:5601'
      - ELASTICSEARCH_HOSTS=http://${KIBANA_HOST}:9200
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
      - '/sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro'
      - '/proc:/hostfs/proc:ro'
      - '/:/hostfs:ro'
      - '${HTPC_DOCKER_COMPOSE_ROOT}/metricbeat/metricbeat.yml:/usr/share/metricbeat/metricbeat.yml'
      - '${HTPC_DOCKER_COMPOSE_ROOT}/metricbeat/metricbeat-ilm.json:/usr/share/metricbeat/metricbeat-ilm.json:ro'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.10
  tautulli:
    image: tautulli/tautulli
    hostname: tau_host
    container_name: tautulli
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - '${CONFIG_ROOT}/tautulli:/config'
    ports:
      - '8181:8181'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.11

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    hostname: jel_host
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_ROOT}/jellyfin:/config
      - ${TV_FOLDER}:/data/tvshows
      - ${MOVIE_FOLDER}:/data/movies
      - ${CONFIG_ROOT}/jellyfin/plugins:/plugins
    ports:
      - 8096:8096
      - 8920:8920  # optional
      - 7359:7359/udp  # optional
      - 1900:1900/udp  # optional
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.12

  flaresolverr:
    # DockerHub mirror flaresolverr/flaresolverr:latest
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=Europe/London
    ports:
      - 8191:8191
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.13
  seerr:
    image: seerr/seerr:latest
    hostname: seerr_host
    container_name: seerr
    user: "1000:1000"
    environment:
      - TZ=Europe/London
    volumes:
      - '${CONFIG_ROOT}/seerr:/app/config'
    ports:
      - '5055:5055'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.15

  cloudflared:
    image: cloudflare/cloudflared:latest
    hostname: cfd_host
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    volumes:
      - '${CONFIG_ROOT}/cloudflared:/home/nonroot/.cloudflared'
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.17

networks:
  htpc_net:
    ipam:
      driver: default
      config:
        - subnet: 172.66.0.0/16
