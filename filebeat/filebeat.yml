filebeat.inputs:
  - type: filestream
    id: docker-container-logs
    paths:
      - /var/lib/docker/containers/*/*.log

    parsers:
      - ndjson:
          target: ""
          add_error_key: true
          message_key: log

    prospector.scanner.symlinks: true

    multiline:
      pattern: '^\['
      negate: true
      match: after

    fields:
      log_source: docker
    fields_under_root: true

processors:
  - add_host_metadata: ~
  - add_docker_metadata: ~
  - add_cloud_metadata: ~

setup.kibana:
  host: "http://192.168.4.125:5601"

setup.ilm.enabled: true
setup.ilm.overwrite: true
setup.ilm.policy_name: "filebeat-new-policy"
setup.ilm.policy_file: "/usr/share/filebeat/filebeat-ilm.json"

output.elasticsearch:
  hosts: ["http://192.168.4.125:9200"]

logging.level: info
