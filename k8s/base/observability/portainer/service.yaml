---
apiVersion: v1
kind: Service
metadata:
  name: portainer
  namespace: observability
  labels:
    app.kubernetes.io/name: portainer
    app.kubernetes.io/part-of: arrs-stack
    app.kubernetes.io/component: management
spec:
  selector:
    app.kubernetes.io/name: portainer
  type: ClusterIP
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: https
      port: 9443
      targetPort: 9443
      protocol: TCP
    - name: edge
      port: 8000
      targetPort: 8000
      protocol: TCP
