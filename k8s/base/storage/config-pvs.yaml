---
# Static hostPath PersistentVolumes for application config directories.
# Mirrors /opt/htpc-config/<service> paths from the original docker-compose setup
# so existing configuration data is preserved during migration.

# ── SABnzbd ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sabnzbd-config
spec:
  storageClassName: ""
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /opt/htpc-config/sabnzbd
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sabnzbd-config
  namespace: htpc
spec:
  storageClassName: ""
  volumeName: sabnzbd-config
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
