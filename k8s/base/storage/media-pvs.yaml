---
# Static hostPath PersistentVolumes for shared media directories.
# These are pre-provisioned on the MicroK8s node and shared across multiple pods.
# ReadWriteMany is supported because all pods run on the same single node.

# ── Movies ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-movies
  labels:
    media-volume: movies
spec:
  storageClassName: ""
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  hostPath:
    path: /mnt/media/movies
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-movies
  namespace: htpc
spec:
  storageClassName: ""
  volumeName: media-movies
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Ti
---
