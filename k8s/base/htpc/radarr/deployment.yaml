---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: htpc
  labels:
    app.kubernetes.io/name: radarr
    app.kubernetes.io/part-of: arrs-stack
    app.kubernetes.io/component: arr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: radarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radarr
        app.kubernetes.io/part-of: arrs-stack
        app.kubernetes.io/component: arr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: radarr
          image: linuxserver/radarr:latest
          ports:
            - name: http
              containerPort: 7878
              protocol: TCP
          env:
            - name: TZ
              value: Europe/London
            - name: UMASK_SET
              value: "002"
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /ping
              port: 7878
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 7878
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: config
              mountPath: /config
            - name: movies
              mountPath: /movies
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: movies
          persistentVolumeClaim:
            claimName: media-movies
        - name: downloads
          persistentVolumeClaim:
            claimName: media-downloads-complete
      restartPolicy: Always
