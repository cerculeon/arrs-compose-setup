---
# ClusterIP for internal web UI access (via cloudflared)
apiVersion: v1
kind: Service
metadata:
  name: transmission
  namespace: htpc
  labels:
    app.kubernetes.io/name: transmission
    app.kubernetes.io/part-of: arrs-stack
    app.kubernetes.io/component: downloader
spec:
  selector:
    app.kubernetes.io/name: transmission
  type: ClusterIP
  ports:
    - name: http
      port: 9091
      targetPort: 9091
      protocol: TCP
---
# NodePort service for BitTorrent peer connectivity (port 51413)
apiVersion: v1
kind: Service
metadata:
  name: transmission-bt
  namespace: htpc
  labels:
    app.kubernetes.io/name: transmission
    app.kubernetes.io/part-of: arrs-stack
    app.kubernetes.io/component: downloader
spec:
  selector:
    app.kubernetes.io/name: transmission
  type: NodePort
  ports:
    - name: torrent-tcp
      port: 51413
      targetPort: 51413
      nodePort: 51413
      protocol: TCP
    - name: torrent-udp
      port: 51413
      targetPort: 51413
      nodePort: 51413
      protocol: UDP
