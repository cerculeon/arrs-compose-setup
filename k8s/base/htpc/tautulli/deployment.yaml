---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tautulli
  namespace: htpc
  labels:
    app.kubernetes.io/name: tautulli
    app.kubernetes.io/part-of: arrs-stack
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tautulli
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tautulli
        app.kubernetes.io/part-of: arrs-stack
        app.kubernetes.io/component: monitoring
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: tautulli
          image: tautulli/tautulli:latest
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
          env:
            - name: TZ
              value: Europe/London
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /
              port: 8181
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8181
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: tautulli-config
      restartPolicy: Always
