---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shelfmark
  namespace: htpc
  labels:
    app.kubernetes.io/name: shelfmark
    app.kubernetes.io/part-of: arrs-stack
    app.kubernetes.io/component: arr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shelfmark
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shelfmark
        app.kubernetes.io/part-of: arrs-stack
        app.kubernetes.io/component: arr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: shelfmark
          image: ghcr.io/calibrain/shelfmark:latest
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP
          env:
            - name: TZ
              value: Europe/London
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8084
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: config
              mountPath: /config
            - name: books
              mountPath: /books
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: shelfmark-config
        - name: books
          persistentVolumeClaim:
            claimName: media-ebooks
        - name: downloads
          persistentVolumeClaim:
            claimName: media-downloads-complete
      restartPolicy: Always
