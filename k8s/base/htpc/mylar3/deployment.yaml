---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mylar3
  namespace: htpc
  labels:
    app.kubernetes.io/name: mylar3
    app.kubernetes.io/part-of: arrs-stack
    app.kubernetes.io/component: arr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mylar3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mylar3
        app.kubernetes.io/part-of: arrs-stack
        app.kubernetes.io/component: arr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: mylar3
          image: lscr.io/linuxserver/mylar3:latest
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8090
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: config
              mountPath: /config
            - name: comics
              mountPath: /comics
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: mylar3-config
        - name: comics
          persistentVolumeClaim:
            claimName: media-comics
        - name: downloads
          persistentVolumeClaim:
            claimName: media-downloads-complete
      restartPolicy: Always
