---
# TEMPLATE ONLY — this Secret must be created by CI before deployment.
# The real token is stored as GitHub Secret CLOUDFLARED_TUNNEL_TOKEN.
#
# To create manually:
#   kubectl create secret generic cloudflared-tunnel-token \
#     --namespace htpc \
#     --from-literal=token=<YOUR_TUNNEL_TOKEN>
#
# To update:
#   kubectl create secret generic cloudflared-tunnel-token \
#     --namespace htpc \
#     --from-literal=token=<YOUR_TUNNEL_TOKEN> \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# DO NOT commit this file with a real token value.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-tunnel-token
  namespace: htpc
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/part-of: arrs-stack
type: Opaque
stringData:
  token: REPLACE_WITH_REAL_TOKEN
