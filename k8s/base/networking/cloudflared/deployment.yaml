---
# Cloudflared creates an outbound-only tunnel to Cloudflare's network.
# No inbound ports need to be opened. It routes requests to in-cluster
# ClusterIP services via their DNS names, acting as the sole ingress path.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: htpc
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/part-of: arrs-stack
    app.kubernetes.io/component: tunnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/part-of: arrs-stack
        app.kubernetes.io/component: tunnel
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-token
                  key: token
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: config
              mountPath: /home/nonroot/.cloudflared
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: cloudflared-config
      restartPolicy: Always
