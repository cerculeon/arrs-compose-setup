---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metricbeat-config
  namespace: observability
  labels:
    app.kubernetes.io/name: metricbeat
    app.kubernetes.io/part-of: arrs-stack
data:
  metricbeat.yml: |
    metricbeat.modules:
      # Host-level system metrics
      - module: system
        period: 10s
        metricsets:
          - cpu
          - load
          - memory
          - network
          - process
          - process_summary
          - socket_summary
          - filesystem
          - fsstat
        processes: [".*"]
        process.include_top_n:
          by_cpu: 5
          by_memory: 5

      # Kubernetes node/pod/container metrics via the API server
      - module: kubernetes
        metricsets:
          - node
          - system
          - pod
          - container
          - volume
        period: 10s
        host: ${NODE_NAME}
        hosts: ["https://${NODE_NAME}:10250"]
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        ssl.verification_mode: "none"
        add_metadata: true

      # Kubernetes state metrics (cluster-wide)
      - module: kubernetes
        metricsets:
          - state_node
          - state_deployment
          - state_replicaset
          - state_statefulset
          - state_pod
          - state_container
          - state_persistentvolume
          - state_persistentvolumeclaim
          - event
        period: 10s
        hosts: ["kube-state-metrics:8080"]
        add_metadata: true

    setup.kibana:
      host: "http://kibana.observability.svc.cluster.local:5601"

    setup.ilm.enabled: true
    setup.ilm.overwrite: true
    setup.ilm.policy_name: "metricbeat"
    setup.ilm.policy_file: "/usr/share/metricbeat/metricbeat-ilm.json"

    output.elasticsearch:
      hosts: ["http://elasticsearch.observability.svc.cluster.local:9200"]

    monitoring.enabled: false
    logging.level: info

    processors:
      - add_host_metadata: ~
      - add_kubernetes_metadata: ~
