---
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: observability
  labels:
    app.kubernetes.io/name: filebeat
    app.kubernetes.io/part-of: arrs-stack
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: filestream
        id: kubernetes-container-logs
        paths:
          - /var/log/containers/*.log
        prospector.scanner.symlinks: true
        parsers:
          - ndjson:
              target: ""
              add_error_key: true
              message_key: log
        multiline:
          pattern: '^\['
          negate: true
          match: after
        fields:
          log_source: kubernetes
        fields_under_root: true

    processors:
      - add_host_metadata: ~
      - add_kubernetes_metadata:
          host: ${NODE_NAME}
          matchers:
            - logs_path:
                logs_path: "/var/log/containers/"
      - add_cloud_metadata: ~

    setup.kibana:
      host: "http://kibana.observability.svc.cluster.local:5601"

    setup.ilm.enabled: true
    setup.ilm.overwrite: true
    setup.ilm.policy_name: "filebeat-new-policy"
    setup.ilm.policy_file: "/usr/share/filebeat/filebeat-ilm.json"

    output.elasticsearch:
      hosts: ["http://elasticsearch.observability.svc.cluster.local:9200"]

    logging.level: info
