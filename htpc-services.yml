version: "3.0"

services:
  sabnzbd:
    image: linuxserver/sabnzbd
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - ${CONFIG_ROOT}/sabnzbd:/config
      - ${COMPLETE_DOWNLOADS}:/downloads
      - ${INCOMPLETE_DOWNLOADS}:/incomplete-downloads #optional
      - ${WATCH_FOLDER}:/media/watch
      - ${TV_FOLDER}:/media/TV
      - ${MOVIE_FOLDER}:/media/MOVIES
    ports:
      - 8088:8080
      - 9999:9090
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.1
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - AUTO_UPDATE=true #optional
      #- RUN_OPTS= #optional
    volumes:
      - ${CONFIG_ROOT}:/config
      - ${WATCH_FOLDER}:/downloads #this might be the wrong place, it could possibly need downloads instead, trying this as a first pass
    ports:
      - 9117:9117
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.2
  transmission:
    image: linuxserver/transmission:3.00-r5-ls137
    container_name: transmission
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    volumes:
      - ${CONFIG_ROOT}/transmission:/config
      - ${COMPLETE_DOWNLOADS}:/downloads
      - ${WATCH_FOLDER}:/watch
    ports:
      - 9091:9091
      - 51413:51413
      - 51413:51413/udp
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.3
  prowlarr:
    image: cr.hotio.dev/hotio/prowlarr
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - UMASK_SET=022
    volumes:
      - ${CONFIG_ROOT}/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.4
  radarr:
    image: linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - UMASK_SET=002 #optional
    volumes:
      - ${CONFIG_ROOT}/radarr:/config
      - ${MOVIE_FOLDER}:/movies
      - ${COMPLETE_DOWNLOADS}:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.5
  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - UMASK_SET=002 #optional
    volumes:
      - ${CONFIG_ROOT}/sonarr:/config
      - ${TV_FOLDER}:/tv
      - ${COMPLETE_DOWNLOADS}:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.6
  mylar3:
    image: lscr.io/linuxserver/mylar3:latest
    container_name: mylar3
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${CONFIG_ROOT}/mylar3:/config
      - ${COMIC_FOLDER}:/comics
      - ${COMPLETE_DOWNLOADS}:/downloads
    ports:
      - 8090:8090
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.7
  readarr:
    image: cr.hotio.dev/hotio/readarr
    container_name: readarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - UMASK_SET=022
    volumes:
      - ${CONFIG_ROOT}/readarr:/config
      - ${EBOOK_FOLDER}:/EBOOKS
      - ${COMPLETE_DOWNLOADS}:/downloads
    ports:
      - 8787:8787
    restart: unless-stopped
    networks:
      htpc_net:
        ipv4_address: 172.66.1.8
  plex:
    image: linuxserver/plex
    container_name: plex
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
    network_mode: host
    volumes:
      - ${CONFIG_ROOT}/plex:/config
      - ${TV_FOLDER}:/data/tvshows
      - ${MOVIE_FOLDER}:/data/movies
      - /media/transcode:/transcode
    restart: unless-stopped
networks:
  htpc_net:
    ipam:
      driver: default
      config:
        - subnet: 172.66.0.0/16
